<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Froola — Electric Dusk</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { background: #08070F; overflow: hidden; font-family: system-ui, sans-serif; }

  canvas { position: fixed; inset: 0; display: block; }

  .permission-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1rem; text-align: center; padding: 2rem;
    background: rgba(8, 7, 15, 0.82);
    backdrop-filter: blur(8px);
    color: #e2e0f0;
  }

  .label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #A855F7;
    font-weight: 600;
  }

  h1 {
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, #C084FC 0%, #06B6D4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .privacy-note {
    font-size: 0.95rem;
    color: #06B6D4;
    font-weight: 500;
  }

  p { color: rgba(226, 224, 240, 0.6); font-size: 0.9rem; }

  .permission-buttons { display: flex; gap: 1rem; margin-top: 0.5rem; }

  .btn-primary {
    padding: 0.75rem 1.75rem;
    border-radius: 9999px; border: none;
    background: linear-gradient(135deg, #A855F7, #06B6D4);
    color: #fff;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    box-shadow: 0 0 24px rgba(168, 85, 247, 0.4);
  }
  .btn-primary:hover { opacity: 0.85; }

  .btn-secondary {
    padding: 0.75rem 1.75rem;
    border-radius: 9999px;
    border: 1px solid rgba(168, 85, 247, 0.4);
    background: transparent; color: #e2e0f0;
    font-size: 0.95rem; cursor: pointer;
  }
  .btn-secondary:hover { border-color: #A855F7; color: #C084FC; }

  .theme-tag {
    position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
    background: rgba(168, 85, 247, 0.15);
    border: 1px solid rgba(168, 85, 247, 0.3);
    color: #C084FC; font-size: 0.75rem; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 0.3rem 0.8rem; border-radius: 9999px;
    font-family: system-ui, sans-serif;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="permission-screen">
  <span class="label">A new instrument</span>
  <h1>Froola</h1>
  <p class="privacy-note">Your camera never leaves your device.</p>
  <p>MediaPipe runs entirely on your device — no video is transmitted.</p>
  <div class="permission-buttons">
    <button class="btn-primary">Enable camera</button>
    <button class="btn-secondary">Use mouse instead</button>
  </div>
</div>
<div class="theme-tag">Option A — Electric Dusk</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let mouse = { x: 0.5, y: 0.5 };
let t = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX / window.innerWidth;
  mouse.y = e.clientY / window.innerHeight;
});

function draw() {
  t += 0.012;
  const w = canvas.width, h = canvas.height;

  ctx.fillStyle = '#08070F';
  ctx.fillRect(0, 0, w, h);

  // Violet haze (warm zone replacement)
  const hazeR = Math.min(w, h) * 0.55;
  const haze = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, hazeR);
  haze.addColorStop(0, 'rgba(168, 85, 247, 0.14)');
  haze.addColorStop(0.5, 'rgba(99, 102, 241, 0.07)');
  haze.addColorStop(1, 'rgba(6, 182, 212, 0)');
  ctx.fillStyle = haze;
  ctx.fillRect(0, 0, w, h);

  // Orb
  const cx = mouse.x * w;
  const cy = mouse.y * h;
  const pulse = 20 + Math.sin(t * 2) * 4;

  // Outer glow — cyan
  const outerGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse * 5);
  outerGlow.addColorStop(0, 'rgba(6, 182, 212, 0.25)');
  outerGlow.addColorStop(0.4, 'rgba(168, 85, 247, 0.12)');
  outerGlow.addColorStop(1, 'rgba(168, 85, 247, 0)');
  ctx.fillStyle = outerGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, pulse * 5, 0, Math.PI * 2);
  ctx.fill();

  // Core orb — white with cyan tint
  const core = ctx.createRadialGradient(cx - pulse*0.2, cy - pulse*0.2, 0, cx, cy, pulse);
  core.addColorStop(0, 'rgba(255, 255, 255, 0.98)');
  core.addColorStop(0.5, 'rgba(186, 230, 253, 0.9)');
  core.addColorStop(1, 'rgba(6, 182, 212, 0.6)');
  ctx.fillStyle = core;
  ctx.beginPath();
  ctx.arc(cx, cy, pulse, 0, Math.PI * 2);
  ctx.fill();

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
