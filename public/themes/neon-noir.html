<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Froola — Neon Noir</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { background: #080808; overflow: hidden; font-family: system-ui, sans-serif; }

  canvas { position: fixed; inset: 0; display: block; }

  .permission-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1rem; text-align: center; padding: 2rem;
    background: rgba(8, 8, 8, 0.80);
    backdrop-filter: blur(6px);
    color: #f0f0f0;
  }

  .label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #BCFF3C;
    font-weight: 600;
  }

  h1 {
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: -0.04em;
    color: #BCFF3C;
    text-shadow: 0 0 40px rgba(188, 255, 60, 0.5);
  }

  .privacy-note {
    font-size: 0.95rem;
    color: #BCFF3C;
    font-weight: 500;
  }

  p { color: rgba(240, 240, 240, 0.5); font-size: 0.9rem; }

  .permission-buttons { display: flex; gap: 1rem; margin-top: 0.5rem; }

  .btn-primary {
    padding: 0.75rem 1.75rem;
    border-radius: 4px; border: none;
    background: #BCFF3C;
    color: #080808;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
    letter-spacing: 0.02em;
    box-shadow: 0 0 32px rgba(188, 255, 60, 0.35);
  }
  .btn-primary:hover { background: #d4ff6e; }

  .btn-secondary {
    padding: 0.75rem 1.75rem;
    border-radius: 4px;
    border: 1px solid rgba(188, 255, 60, 0.3);
    background: transparent; color: #f0f0f0;
    font-size: 0.95rem; cursor: pointer;
  }
  .btn-secondary:hover { border-color: #BCFF3C; color: #BCFF3C; }

  .theme-tag {
    position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
    background: rgba(188, 255, 60, 0.1);
    border: 1px solid rgba(188, 255, 60, 0.25);
    color: #BCFF3C; font-size: 0.75rem; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 0.3rem 0.8rem; border-radius: 4px;
    font-family: system-ui, sans-serif;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="permission-screen">
  <span class="label">A new instrument</span>
  <h1>Froola</h1>
  <p class="privacy-note">Your camera never leaves your device.</p>
  <p>MediaPipe runs entirely on your device — no video is transmitted.</p>
  <div class="permission-buttons">
    <button class="btn-primary">Enable camera</button>
    <button class="btn-secondary">Use mouse instead</button>
  </div>
</div>
<div class="theme-tag">Option B — Neon Noir</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let mouse = { x: 0.5, y: 0.5 };
let t = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX / window.innerWidth;
  mouse.y = e.clientY / window.innerHeight;
});

function draw() {
  t += 0.012;
  const w = canvas.width, h = canvas.height;

  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, w, h);

  // Grid lines — subtle
  ctx.strokeStyle = 'rgba(188, 255, 60, 0.04)';
  ctx.lineWidth = 1;
  const gridSize = 60;
  for (let x = 0; x < w; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
  }
  for (let y = 0; y < h; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }

  // Orb
  const cx = mouse.x * w;
  const cy = mouse.y * h;
  const pulse = 18 + Math.sin(t * 2.5) * 3;

  // Outer glow — neon green
  const outerGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse * 6);
  outerGlow.addColorStop(0, 'rgba(188, 255, 60, 0.2)');
  outerGlow.addColorStop(0.5, 'rgba(188, 255, 60, 0.06)');
  outerGlow.addColorStop(1, 'rgba(188, 255, 60, 0)');
  ctx.fillStyle = outerGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, pulse * 6, 0, Math.PI * 2);
  ctx.fill();

  // Core orb
  const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse);
  core.addColorStop(0, 'rgba(255, 255, 255, 1)');
  core.addColorStop(0.4, 'rgba(212, 255, 110, 0.95)');
  core.addColorStop(1, 'rgba(188, 255, 60, 0.7)');
  ctx.fillStyle = core;
  ctx.beginPath();
  ctx.arc(cx, cy, pulse, 0, Math.PI * 2);
  ctx.fill();

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
